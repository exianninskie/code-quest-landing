name: code_quest
description: A storytelling game that teaches coding concepts.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase - your backend
  supabase_flutter: ^2.3.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Local storage (save auth session)
  shared_preferences: ^2.2.2

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # UI helpers
  google_fonts: ^6.2.1
  gap: ^3.0.1
  cached_network_image: ^3.3.1

  # Utils
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  image_picker: ^1.2.1
  screenshot: ^3.0.0
  share_plus: ^10.1.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  url_launcher: ^6.3.2
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/docs/
